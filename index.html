<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Editor – Add Level / Region</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 540px; margin: 20px auto; padding: 20px; background: #f8f9fa; }
    h1 { text-align: center; }
    label { display: block; margin: 12px 0 4px; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    button { margin-top: 20px; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; width: 100%; }
    button:hover { background: #218838; }
    .note { color: #666; font-size: 0.9rem; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Add New Map Level or Region</h1>
  <form id="mapForm" action="YOUR_APPS_SCRIPT_EXEC_URL" method="POST">
  <fieldset>
    <legend>Basic Info</legend>
    
    <label for="level">Map Level (0 = main island, 1 = gulf, etc.):</label>
    <input type="number" id="level" name="level" min="0" required placeholder="e.g. 4" />

    <label for="imageUrl">Image Path (upload to GitHub first):</label>
    <input type="text" id="imageUrl" name="imageUrl" required placeholder="images/volcano_interior.jpg" />
    <small>Relative path — case sensitive!</small>
    <div id="imagePreview" style="margin:10px 0;">
      <img id="previewImg" style="max-width:200px; display:none;" alt="Preview" />
    </div>
  </fieldset>

  <fieldset>
    <legend>Zoom Region (optional – defines clickable area to next level)</legend>
    
    <label for="points">Polygon Points (x1,y1 x2,y2 ...):</label>
    <textarea id="points" name="points" rows="3" placeholder="e.g. 100,200 300,150 450,300 200,500"></textarea>
    <small>Tip: Use an online tool like https://www.image-map.net/ — open your image, click points, copy the coords</small>

    <label for="nextLevel">Zooms to Level:</label>
    <input type="number" id="nextLevel" name="nextLevel" min="0" placeholder="e.g. 5" />
  </fieldset>

  <fieldset>
    <legend>Interactive Object / Marker (optional)</legend>
    
    <label for="objType">Type:</label>
    <select id="objType" name="objectType">
      <option value="">None</option>
      <option value="marker">Simple Marker (gold circle)</option>
      <option value="icon">Image Icon</option>
      <option value="npc">NPC / Character</option>
      <option value="collectible">Collectible Item</option>
    </select>

    <div id="objFields" style="display:none;">
      <label for="objPoints">Position (x,y):</label>
      <input type="text" id="objPoints" name="objectPoints" placeholder="e.g. 320,480" />

      <label for="objName">Name:</label>
      <input type="text" id="objName" name="objName" placeholder="Treasure Chest" />

      <label for="objDesc">Description / Dialog:</label>
      <textarea id="objDesc" name="objDesc" rows="2"></textarea>

      <label for="objImage">Image Path (for icons/NPCs):</label>
      <input type="text" id="objImage" name="objImage" placeholder="images/icons/chest.png" />
    </div>
  </fieldset>

  <button type="submit">Save → Add to Sheet</button>
</form>

  <p style="text-align:center; margin-top:30px;">
    <a href="https://guerillagardeningkzn-design.github.io/hawaii/">← Back to Map Viewer</a>
  </p>

  <!-- Optional: simple success message if you want to stay on page -->
  <script>
// Auto-preview image path
document.getElementById('imageUrl').addEventListener('input', function() {
  const val = this.value.trim();
  const preview = document.getElementById('previewImg');
  if (val) {
    preview.src = val;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
});

// Show/hide object fields
document.getElementById('objType').addEventListener('change', function() {
  document.getElementById('objFields').style.display = this.value ? 'block' : 'none';
});

// Auto-build ObjectProperties JSON before submit
document.getElementById('mapForm').addEventListener('submit', function(e) {
  const type = document.getElementById('objType').value;
  if (type) {
    const props = {
      name: document.getElementById('objName').value.trim(),
      desc: document.getElementById('objDesc').value.trim(),
      image: document.getElementById('objImage').value.trim() || undefined
    };
    // Clean empty values
    Object.keys(props).forEach(k => !props[k] && delete props[k]);
    const hiddenInput = document.createElement('input');
    hiddenInput.type = 'hidden';
    hiddenInput.name = 'objectProperties';
    hiddenInput.value = JSON.stringify(props);
    this.appendChild(hiddenInput);
  }
});
</script>
</body>
</html>
