<script>
// ────────────────────────────────────────────────
// CONFIG
// ────────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz187kpP3gtvzMtVsMq4COdMp2LR87SifTT-AnMIr-KGnsjNCxnWEP1kshSWVdz7ndE/exec";

const ASSET_BASE = window.location.hostname.includes('github.io')
    ? 'images/'
    : 'https://raw.githubusercontent.com/guerillagardeningkzn-design/Hawaii/main/images/';  // ← CHANGE THIS

const MAP_BACKGROUND_PREFIX = 'backgrounds/';  // ← CHANGE THIS TO MATCH YOUR FILES
// Options:
// 'backgrounds/'  → recommended (organized)
// 'images/'       → if flat structure
// ''              → if filename already includes folder e.g. 'backgrounds/hawaii.jpg'

const typeToFolder = {
    'Pickup': 'collectables',
    'Npc': 'npcs',
    'Object': 'objects',
    'Marker': 'markers',
    'Zoomto': 'transitions',
    'Map': 'transitions'
};

// ────────────────────────────────────────────────
// BUILDER – CANVAS & PLACEMENT
// ────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let bgImg = new Image();
let currentPoint = null;

function resizeCanvas() {
    if (bgImg.naturalWidth > 0) {
        const maxW = window.innerWidth - 80;
        canvas.width = Math.min(bgImg.naturalWidth, maxW);
        canvas.height = bgImg.naturalHeight * (canvas.width / bgImg.naturalWidth);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (bgImg.src && bgImg.complete) {
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    }
    if (currentPoint) {
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.arc(currentPoint.x, currentPoint.y, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

canvas.addEventListener('click', e => {
    if (!bgImg.src || !bgImg.complete) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / bgImg.naturalWidth;
    const scaleY = canvas.height / bgImg.naturalHeight;
    const x = Math.round((e.clientX - rect.left) / scaleX);
    const y = Math.round((e.clientY - rect.top) / scaleY);
    currentPoint = { x: Math.max(0, Math.min(x, bgImg.naturalWidth)), y: Math.max(0, Math.min(y, bgImg.naturalHeight)) };
    draw();
    updateSaveButton();
});

document.getElementById('imageInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        bgImg.onload = () => {
            resizeCanvas();
            draw();
            // suggest filename based on type
            const typ = document.getElementById('typeSelect').value;
            const folder = typ && typeToFolder[typ] ? typeToFolder[typ] + '/' : '';
            document.getElementById('filenameInput').value = folder + file.name;
            updateSaveButton();
        };
        bgImg.src = ev.target.result;
    };
    reader.readAsDataURL(file);
});

// Auto-load background from GitHub when map is selected
document.getElementById('mapSelect').addEventListener('change', async function() {
    const mapId = this.value;
    const status = document.getElementById('status');

    if (!mapId) {
        bgImg.src = '';
        draw();
        status.textContent = 'Select a map to load background';
        currentPoint = null;
        updateSaveButton();
        return;
    }

    try {
        const r = await fetch(`${SCRIPT_URL}?action=getMaps`);
        const data = await r.json();

        if (data.status !== 'success') throw new Error('Maps fetch failed');

        const selectedMap = data.maps.find(m => m.mapId === mapId);
        if (!selectedMap) {
            status.textContent = 'Selected map not found';
            bgImg.src = '';
            draw();
            return;
        }

        const bgFilename = selectedMap.background?.trim();
        if (!bgFilename) {
            status.textContent = 'No background filename set for this map';
            bgImg.src = '';
            draw();
            return;
        }

        // Build full path using prefix
        const fullPath = MAP_BACKGROUND_PREFIX + bgFilename;
        bgImg.src = ASSET_BASE + fullPath;

        bgImg.onload = () => {
            resizeCanvas();
            draw();
            status.textContent = `Background loaded: ${fullPath}`;
            currentPoint = null;
            updateSaveButton();
        };

        bgImg.onerror = () => {
            status.textContent = `Failed to load background: ${fullPath} – check file in repo`;
            bgImg.src = '';
            draw();
        };

    } catch (err) {
        console.error('Background load error:', err);
        status.textContent = 'Error loading map background';
    }
});

function updateSaveButton() {
    const map = document.getElementById('mapSelect').value;
    const type = document.getElementById('typeSelect').value;
    const name = document.getElementById('nameInput').value.trim();
    const filename = document.getElementById('filenameInput').value.trim();
    document.getElementById('saveBtn').disabled = !(map && type && name && filename && currentPoint);
}

document.getElementById('clearBtn').addEventListener('click', () => {
    currentPoint = null;
    draw();
    updateSaveButton();
});

document.getElementById('typeSelect').addEventListener('change', e => {
    const typ = e.target.value;
    document.getElementById('targetGroup').style.display = (typ === 'Zoomto' || typ === 'Map') ? 'block' : 'none';
    updateSaveButton();
    // auto-suggest folder
    if (typ in typeToFolder) {
        let val = document.getElementById('filenameInput').value;
        const folder = typeToFolder[typ] + '/';
        if (!val.startsWith(folder)) {
            val = folder + val.split('/').pop();
            document.getElementById('filenameInput').value = val;
        }
    }
});

// Save entity
document.getElementById('saveBtn').addEventListener('click', async () => {
    const formData = new FormData();
    formData.append("sheet", "Entities");
    formData.append("mapId", document.getElementById('mapSelect').value);
    formData.append("type", document.getElementById('typeSelect').value);
    formData.append("name", document.getElementById('nameInput').value.trim());
    formData.append("description", document.getElementById('descInput').value.trim());
    formData.append("filename", document.getElementById('filenameInput').value.trim());
    formData.append("positionX", currentPoint.x);
    formData.append("positionY", currentPoint.y);
    if (['Zoomto','Map'].includes(document.getElementById('typeSelect').value)) {
        formData.append("target", document.getElementById('targetInput').value.trim());
    }

    const status = document.getElementById('status');
    status.textContent = 'Saving entity...';

    try {
        await fetch(SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' });
        status.textContent = `Entity saved ✓ (${currentPoint.x}, ${currentPoint.y})`;
        currentPoint = null;
        draw();
        updateSaveButton();
    } catch (err) {
        status.textContent = 'Save failed – check console';
        console.error(err);
    }
});

// ────────────────────────────────────────────────
// MAPS DROPDOWN & LIST
// ────────────────────────────────────────────────
async function loadMapsIntoDropdown() {
    try {
        const r = await fetch(`${SCRIPT_URL}?action=getMaps`);
        const data = await r.json();
        if (data.status === "success") {
            const sel = document.getElementById('mapSelect');
            sel.innerHTML = '<option value="">— select map —</option>';
            data.maps?.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.mapId;
                opt.textContent = `${m.name} (${m.mapId})`;
                sel.appendChild(opt);
            });
        }
    } catch (e) { console.error('loadMapsIntoDropdown error:', e); }
}

async function loadMaps() {
    try {
        const r = await fetch(`${SCRIPT_URL}?action=getMaps`);
        const data = await r.json();
        if (data.status === "success") {
            const tbody = document.querySelector('#mapsTable tbody');
            tbody.innerHTML = data.maps?.length ? '' : '<tr><td colspan="4">No maps yet</td></tr>';
            data.maps?.forEach(m => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${m.mapId}</td><td>${m.name}</td><td>${m.background}</td><td>${m.description||''}</td>`;
                tbody.appendChild(tr);
            });
        }
    } catch (e) { console.error('loadMaps error:', e); }
}

document.getElementById('saveMapBtn').addEventListener('click', async () => {
    const name = document.getElementById('mapName').value.trim();
    if (!name) return alert("Map name required");
    const formData = new FormData();
    formData.append("sheet", "Maps");
    formData.append("name", name);
    formData.append("background", document.getElementById('mapBackground').value.trim());
    formData.append("description", document.getElementById('mapDesc').value.trim());
    try {
        await fetch(SCRIPT_URL, {method:'POST', body:formData, mode:'no-cors'});
        loadMaps();
        loadMapsIntoDropdown();
        alert("Map saved!");
    } catch (e) {
        console.error(e);
        alert("Save failed");
    }
});

// ────────────────────────────────────────────────
// ENTITIES LIST & ANIMATION PREVIEW
// ────────────────────────────────────────────────
async function loadEntities() {
    try {
        const r = await fetch(`${SCRIPT_URL}?action=getEntities`);
        const data = await r.json();
        if (data.status === "success") {
            const tbody = document.querySelector('#entitiesTable tbody');
            tbody.innerHTML = data.entities?.length ? '' : '<tr><td colspan="7">No entities yet</td></tr>';
            data.entities?.forEach(e => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${e.entityId||''}</td>
                    <td>${e.mapId||''}</td>
                    <td>${e.type||''}</td>
                    <td>${e.name||''}</td>
                    <td>${e.filename||''}</td>
                    <td>${e.positionX||0},${e.positionY||0}</td>
                    <td><img src="${ASSET_BASE}${e.filename||''}" style="max-height:48px;" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw=='"></td>
                `;
                tbody.appendChild(tr);
            });
        }
    } catch (e) { console.error('loadEntities error:', e); }
}

// Animation preview loop
const previewCanvas = document.getElementById('entPreviewCanvas');
const pCtx = previewCanvas.getContext('2d');
let previewImg = null;
let frame = 0;
let lastTs = 0;

function animate(ts) {
    if (!previewImg) return requestAnimationFrame(animate);
    if (!lastTs) lastTs = ts;
    const fps = +document.getElementById('animFps').value || 10;
    if (ts - lastTs > 1000 / fps) {
        frame = (frame + 1) % (+document.getElementById('framesPerAnim').value || 4);
        lastTs = ts;
    }
    pCtx.clearRect(0,0,previewCanvas.width,previewCanvas.height);
    const fw = +document.getElementById('frameW').value || 64;
    const fh = +document.getElementById('frameH').value || 64;
    pCtx.drawImage(previewImg, frame*fw, 0, fw, fh, 80, 40, fw*3, fh*3);
    requestAnimationFrame(animate);
}

document.getElementById('animSheetFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        previewImg = new Image();
        previewImg.src = ev.target.result;
        previewImg.onload = () => {
            document.getElementById('animFilename').value = file.name;
            frame = 0;
        };
    };
    reader.readAsDataURL(file);
});

requestAnimationFrame(animate);

// ────────────────────────────────────────────────
// TAB SWITCHING + INIT
// ────────────────────────────────────────────────
document.querySelectorAll('.tab-button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        const tab = btn.dataset.tab;
        document.getElementById(tab).style.display = 'block';
        btn.classList.add('active');

        if (tab === 'builder') loadMapsIntoDropdown();
        if (tab === 'maps') loadMaps();
        if (tab === 'entities') loadEntities();
    });
});

// Initial load
loadMapsIntoDropdown();
</script>
