<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Editor – Add Level / Region</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 540px; margin: 20px auto; padding: 20px; background: #f8f9fa; }
    h1 { text-align: center; }
    label { display: block; margin: 12px 0 4px; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    button { margin-top: 20px; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; width: 100%; }
    button:hover { background: #218838; }
    .note { color: #666; font-size: 0.9rem; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Add New Map Level or Region</h1>
  
  <form id="mapForm" action="YOUR_APPS_SCRIPT_EXEC_URL_HERE" method="POST">
    <label for="level">Level (integer, e.g. 0, 1, 2...):</label>
    <input type="number" id="level" name="level" min="0" required placeholder="e.g. 3 for a new sub-map">
    
    <label for="imageUrl">Image URL / Path:</label>
    <input type="text" id="imageUrl" name="imageUrl" required placeholder="images/new_area.jpg">
    <div class="note">Upload image to GitHub repo first → use relative path like images/...</div>
    
    <label for="points">Polygon Points (optional – leave blank if just adding level without region):</label>
    <textarea id="points" name="points" rows="4" placeholder="e.g. 100,100 200,100 200,200 100,200"></textarea>
    <div class="note">Space-separated x,y pairs. Use an online SVG polygon tool to get accurate points from your image.</div>
    
    <label for="nextLevel">Next Level (if this region zooms somewhere):</label>
    <input type="number" id="nextLevel" name="nextLevel" min="0" placeholder="e.g. 4">
    
    <button type="submit">Save to Sheet</button>
  </form>

  <p style="text-align:center; margin-top:30px;">
    <a href="https://guerillagardeningkzn-design.github.io/hawaii/">← Back to Map Viewer</a>
  </p>

  <!-- Optional: simple success message if you want to stay on page -->
  <script>
    // If redirected back with ?success, show message
    if (window.location.search.includes('success')) {
      alert('Saved successfully! Check your Google Sheet.');
    }
  </script>
</body>
</html>
